<!DOCTYPE html>
<html>

<head>

    <title>Forecast Results</title>

    <style>

        body{
            font-family:Arial;
            background:#0f172a;
            color:white;
            padding:40px;
        }

        .top{
            text-align:center;
            margin-bottom:40px;
        }

        .top h1{
            font-size:50px;
            margin-bottom:10px;
        }

        .top p{
            color:#cbd5e1;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom:40px;
        }

        .card{
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            text-align:center;
        }

        .card h2{
            font-size:40px;
            color:#38bdf8;
        }

        .card p{
            color:#cbd5e1;
        }

        .graph-box{
            background:white;
            padding:20px;
            border-radius:15px;
            margin-bottom:40px;
        }

        .table-box{
            background:white;
            color:black;
            padding:20px;
            border-radius:15px;
            overflow:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#0ea5e9;
            color:white;
        }

    </style>

</head>

<body>

    <div class="top">

        <h1>Sales Forecast Dashboard</h1>

        <p>
            Prophet-based predictive analytics for retail sales forecasting
        </p>

    </div>


    <div class="cards">

        <div class="card">
            <h2>{{ avg_sales }}</h2>
            <p>Average Forecast Sales</p>
        </div>

        <div class="card">
            <h2>{{ max_sales }}</h2>
            <p>Highest Forecast</p>
        </div>

        <div class="card">
            <h2>{{ min_sales }}</h2>
            <p>Lowest Forecast</p>
        </div>

    </div>


    <div class="graph-box">

        {{ graph_html | safe }}

    </div>


    <div class="table-box">

        {{ table_html | safe }}

    </div>

</body>

</html>
